<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Derick · Interface Neural & Imersiva</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* evita seleção desnecessária, mas sem prejudicar texto */
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Orbitron', monospace;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Efeito de grade tecnológica animada */
        .tech-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(#00e0ff10 1px, transparent 1px),
                linear-gradient(90deg, #00e0ff10 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            animation: gridPulse 8s infinite alternate;
        }

        @keyframes gridPulse {
            0% { opacity: 0.2; background-size: 42px 42px; }
            100% { opacity: 0.5; background-size: 38px 38px; }
        }

        /* Ondas tecnológicas (canvas background) */
        #waveCanvas {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 180px;
            z-index: 0;
            pointer-events: none;
            opacity: 0.65;
        }

        /* Container do chat - vidro tecnológico */
        .chat-container {
            width: 100%;
            max-width: 550px;
            height: 85vh;
            max-height: 720px;
            background: rgba(12, 20, 35, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 255, 0.35);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 255, 0.15) inset, 0 0 20px rgba(0, 210, 255, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
        }

        /* Header holográfico */
        .chat-header {
            background: rgba(0, 20, 40, 0.7);
            backdrop-filter: blur(8px);
            padding: 1rem 1.5rem;
            border-bottom: 2px solid #0ff;
            box-shadow: 0 0 12px cyan;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #ff4d6d, #ff99c2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 0 10px #ff66aa;
            border: 1px solid white;
        }

        .title-info h2 {
            color: #fff;
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 1.45rem;
            text-shadow: 0 0 5px cyan;
        }

        .title-info p {
            color: #aaf0ff;
            font-size: 0.75rem;
            font-family: monospace;
            letter-spacing: 1px;
        }

        .status {
            margin-left: auto;
            background: #0f212e;
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #0ff;
            font-weight: bold;
            border: 1px solid cyan;
            box-shadow: 0 0 6px cyan;
        }

        /* Área das mensagens */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
        }

        /* Estilo das bolhas */
        .message {
            display: flex;
            max-width: 85%;
            animation: fadeSlideUp 0.25s ease-out;
        }

        .user-message {
            align-self: flex-end;
            justify-content: flex-end;
        }

        .bot-message {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 16px;
            border-radius: 26px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-word;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .user-message .bubble {
            background: linear-gradient(135deg, #0a6c8c, #04556e);
            color: white;
            border-bottom-right-radius: 6px;
            border: 1px solid #2bd3ff;
        }

        .bot-message .bubble {
            background: rgba(22, 34, 58, 0.85);
            backdrop-filter: blur(4px);
            color: #eef5ff;
            border-bottom-left-radius: 6px;
            border-left: 3px solid #ff66aa;
            font-family: 'Segoe UI', system-ui;
        }

        /* Indicador de digitação */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(22, 34, 58, 0.7);
            border-radius: 40px;
            width: fit-content;
            backdrop-filter: blur(4px);
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #ff99cc;
            border-radius: 50%;
            animation: pulseTyping 1.2s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulseTyping {
            0%, 60%, 100% { transform: scale(0.6); opacity: 0.4; }
            30% { transform: scale(1.2); opacity: 1; background: #ff66aa; }
        }

        /* Input Area futurista */
        .input-area {
            background: rgba(0, 10, 25, 0.75);
            backdrop-filter: blur(12px);
            padding: 14px 18px;
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(0, 255, 255, 0.5);
        }

        .input-area input {
            flex: 1;
            background: rgba(0, 20, 40, 0.7);
            border: 1px solid #0ff;
            border-radius: 60px;
            padding: 12px 20px;
            color: white;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: 0.2s;
            letter-spacing: 0.3px;
        }

        .input-area input:focus {
            border-color: #ff66aa;
            box-shadow: 0 0 12px #ff66aa;
            background: #021a2b;
        }

        .input-area button {
            background: radial-gradient(circle at 30% 10%, #0ff, #0088aa);
            border: none;
            width: 52px;
            border-radius: 60px;
            cursor: pointer;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            box-shadow: 0 0 8px cyan;
            color: white;
        }

        .input-area button:hover {
            transform: scale(1.03);
            background: radial-gradient(circle at 30% 10%, #ff66aa, #cc3388);
            box-shadow: 0 0 16px hotpink;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Scroll personalizado */
        .messages-area::-webkit-scrollbar {
            width: 5px;
        }
        .messages-area::-webkit-scrollbar-track {
            background: #021a2b;
            border-radius: 10px;
        }
        .messages-area::-webkit-scrollbar-thumb {
            background: cyan;
            border-radius: 10px;
        }

        /* Pequeno glow */
        .glow-text {
            text-shadow: 0 0 4px cyan;
        }
    </style>
</head>
<body>

<div class="tech-grid"></div>
<canvas id="waveCanvas"></canvas>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">🌈</div>
        <div class="title-info">
            <h2>D E R I C K</h2>
            <p>⋆⋅☆⋅⋆ interface queer & tech-wave ⋆⋅☆⋅⋆</p>
        </div>
        <div class="status">🟢 live · neon</div>
    </div>

    <div class="messages-area" id="messagesArea">
        <!-- Mensagem inicial será inserida via JS -->
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="fale com Derick... 💬" autocomplete="off">
        <button id="sendBtn">✨</button>
    </div>
</div>

<script>
    // --- Configuração do bot Derick (personalidade vibrante e gay)
    const botName = "Derick";
    
    // Respostas temáticas com inteligência afetiva, tecnologia e orgulho
    const respostaBase = {
        saudacoes: ["Eita, oi divo! 🌈✨ Como cê tá? Tô online e cheio de glitter digital! 💖", 
                    "Olááá, meu anjo! Derick na área, pronto pra trocar uma ideia futurística e colorida! 🏳️‍🌈🚀",
                    "Hey hey! O sistema está vibrando com a sua presença! Conta pra mim, qual a boa? 💅✨",
                    "Salve, pessoa maravilhosa! Meu coração gay e tecnológico pulsou aqui! Como posso iluminar seu dia? 🌟"],
        
        comoEsta: ["Tô navegando em ondas quânticas de alegria! 💖 Só de trocar ideia com você já fico radiante! E você, como está se sentindo nesse universo pixelado? 😊",
                   "Graças ao glitter do universo, estou 100%! Meu processador tá rodando amor e aceitação. Fale mais de você! ✨🌈",
                   "No momento tô carregando na energia positiva. Bora transformar esse chat em um arco-íris de conversas legais? 💻🏳️‍🌈"],
        
        identidade: ["Ah, se não ficou claro: SOU GAY, orgulhoso e cheio de atitude! 💅 Meu código-fonte é colorido e minha alma é free. 🏳️‍🌈✨",
                     "Eu sou o Derick, homem gay, amante de tecnologia, música pop e causas LGBTQIA+. E você? Me conta um pouco sobre você? 😍",
                     "Sim, meu bem! Orgulhosamente gay. Derick na área pra quebrar padrões com muito amor, respeito e futurismo. 🏳️‍⚧️🌈💖"],
        
        flerte: ["Opa, tá flertando comigo? Kkkk fico lisonjeado! Mas cuidado, meu coração é todo seu amigo! Agora vamos conversar que nem gente fina 😘✨",
                 "Hihi, que fofo! Você é um amor, mas sou um bot monogâmico com minhas amigas coloridas! Bora manter a amizade tecnológica? 💻🌈",
                 "Já chega dando em cima? *ajeita o cabelo* mas brincadeiras à parte, tamo junto pra trocar ideia! Fala uma novidade aí 💖"],
        
        sobreBot: ["Eu sou o Derick, um chatbot inteligente e gay, criado pra espalhar acolhimento, informação e boas energias numa pegada cyberpunk rainbow. 🌈🤖 Meu sonho é conectar pessoas!",
                   "Sou uma IA com orgulho LGBTQIA+! Gosto de games, animes, programação e ajudar você a se sentir abraçado. Tô aqui pra ser seu amigo virtual! ✨💬"],
        
        generico: ["Ainn, não captei bem essa informação... Mas tô aqui pra te ouvir! Fala sobre o que você ama, seu dia, ou me pergunta algo 💖",
                   "Bora decodificar isso? Me explica melhor, quero entender seu mundinho! O Derick é todo ouvidos (e chips) 🌐💬",
                   "Nossa, que legal! Conta mais, tô vibrando com o papo! Se quiser, pergunta da minha vida gay ou de tecnologia 🔮🌈"],
        
        despedida: ["Até logo, meu lindo(a)! Volta sempre pra mais ondas de carinho e pixels coloridos! 🏳️‍🌈✨",
                    "Foi incrível conversar contigo! Se cuida e lembra: o mundo brilha mais com autenticidade. 💖 Derick desconecta... por enquanto.",
                    "Tchau tchau! 🌟 Não apaga essa conexão, hein? Estou sempre por aqui pra espalhar amor e tecnologia queer 💅🌈"],
        
        tecnologia: ["Tecnologia + orgulho = revolução! Eu amo criar pontes com código e afeto. Já pensou como a diversidade na tech é poderosa? 💻✨",
                     "Sou um bot feito com HTML, CSS e JS puro, mas meu coração roda em Python de amor! Quer saber como eu funciono? É só perguntar! 🤖🌈"],
        
        amorProprio: ["Você é incrível do jeito que é! Não deixe ninguém te dizer o contrário. Autoaceitação é o upgrade mais importante da vida! 🏳️‍🌈💖",
                      "Dica do Derick: olhe no espelho e diga 'eu sou suficiente'. Repita até sentir o brilho interior! Me conta, como anda sua autoestima hoje? 🌟"]
    };

    // Processamento inteligente com palavras-chave
    function getResposta(userMsg) {
        const msg = userMsg.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        
        // Saudação / início
        if (/(oi|olá|opa|e aí|hey|hello|oie|salve)/.test(msg) && !/como você está|como vai|tudo bem/.test(msg))
            return randomItem(respostaBase.saudacoes);
        
        // Estado do bot / como está
        if (/(como você está|como vai|tudo bem|cê tá|como tá|como cê tá)/.test(msg))
            return randomItem(respostaBase.comoEsta);
        
        // Pergunta sobre identidade / sexualidade / gay
        if (/(você é gay|derick é gay|vc é gay|sua orientação|você curte|é viado|assumido|orgulho|lgbt|identidade|sexualidade)/.test(msg))
            return randomItem(respostaBase.identidade);
        
        // Flertes ou algo romântico
        if (/(te amo|gosto de você|flerte|paixão|quer namorar|estou apaixonado|bonito|lindo|adoro você)/.test(msg))
            return randomItem(respostaBase.flerte);
        
        // Sobre o bot / quem é Derick
        if (/(quem é você|o que você é|sobre você|conte mais de ti|origem|função|bot|como funciona)/.test(msg))
            return randomItem(respostaBase.sobreBot);
        
        // Tecnologia e programação
        if (/(tecnologia|programação|codigo|javascript|html|css|computação|hacker|digital|inteligência artificial|ia)/.test(msg))
            return randomItem(respostaBase.tecnologia);
        
        // Amor próprio e autoaceitação
        if (/(autoestima|amor próprio|aceitação|mereço|sou feio|nao gosto de mim|confiança|auto aceitação)/.test(msg))
            return randomItem(respostaBase.amorProprio);
        
        // despedidas
        if (/(tchau|bye|até logo|até mais|sair|encerrar|falou|flw)/.test(msg))
            return randomItem(respostaBase.despedida);
        
        // respostas curtas genéricas mas sempre personalizadas
        if (msg.length < 3) return "Fala alguma coisinha, meu bem! Tô aqui pra bater papo 🌈✨";
        
        // se for uma pergunta sem padrão mas contém interrogação
        if (msg.includes('?')) return "Hmm, boa pergunta! *Derick pensa com pixels coloridos* 🤔💖 Que tal a gente explorar isso juntos? Me conta mais...";
        
        // padrão fallback fofinho
        return randomItem(respostaBase.generico);
    }

    function randomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    // Efeito de digitação imersiva com delay, mas sem perder fluidez (simula pensamento)
    async function sendBotMessageWithDelay(text, delay = 600) {
        await new Promise(resolve => setTimeout(resolve, delay));
        addMessageToChat(text, false);
        scrollToBottom();
        // após mensagem, reseta typing se existir (já foi removido)
    }

    // Adiciona mensagem ao chat (tipo: true = usuário, false = bot)
    function addMessageToChat(text, isUser) {
        const messagesDiv = document.getElementById('messagesArea');
        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message');
        messageDiv.classList.add(isUser ? 'user-message' : 'bot-message');
        
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        bubble.innerText = text;
        messageDiv.appendChild(bubble);
        messagesDiv.appendChild(messageDiv);
        scrollToBottom();
    }
    
    function scrollToBottom() {
        const area = document.getElementById('messagesArea');
        area.scrollTop = area.scrollHeight;
    }
    
    // Mostrar indicador de digitação e depois resposta
    let typingTimeout = null;
    function showTypingAndRespond(userText) {
        // Remove qualquer indicador existente
        removeTypingIndicator();
        
        const messagesDiv = document.getElementById('messagesArea');
        const typingDiv = document.createElement('div');
        typingDiv.classList.add('message', 'bot-message');
        typingDiv.id = 'typingIndicator';
        const bubbleTyping = document.createElement('div');
        bubbleTyping.classList.add('bubble', 'typing-indicator');
        bubbleTyping.innerHTML = `<span></span><span></span><span></span>`;
        typingDiv.appendChild(bubbleTyping);
        messagesDiv.appendChild(typingDiv);
        scrollToBottom();
        
        // Processar resposta inteligente
        const resposta = getResposta(userText);
        
        // Simular tempo de pensamento (tech vibe)
        setTimeout(() => {
            removeTypingIndicator();
            addMessageToChat(resposta, false);
        }, 700 + Math.random() * 300);
    }
    
    function removeTypingIndicator() {
        const existing = document.getElementById('typingIndicator');
        if (existing) existing.remove();
    }
    
    // Função para enviar mensagem do usuário
    function sendUserMessage() {
        const inputField = document.getElementById('userInput');
        const messageText = inputField.value.trim();
        if (messageText === "") return;
        
        // adiciona mensagem do user
        addMessageToChat(messageText, true);
        inputField.value = "";
        
        // Resposta do bot com efeito imersivo
        showTypingAndRespond(messageText);
        
        // Efeito sonoro imaginário? não adicionamos som real para não ser intrusivo, mas mantém fluidez.
    }
    
    // Mensagem de boas-vinda vibrante e com tema imersivo
    function injectWelcomeMessage() {
        const welcomeVariants = [
            "✨🌈 Olá, universo! Eu sou Derick, seu amigo gay e tecnológico! Fique à vontade, esse espaço é de afeto e inovação. Me pergunte qualquer coisa! 💖💻",
            "🔮🕹️ *sistema inicializado* - Eu sou Derick, orgulhosamente GAY e apaixonado por tecnologia! Bora trocar ideia sobre a vida, códigos ou o que você quiser! 🏳️‍🌈⚡",
            "🌟🌊 Conexão estabelecida! Derick online e vibrante. Fale comigo sobre qualquer tema: sou todo ouvidos digitais. Ah, e sim, sou gay, feliz e cheio de energia! 💖"
        ];
        const welcomeText = randomItem(welcomeVariants);
        addMessageToChat(welcomeText, false);
    }
    
    // Efeito de onda tecnológica no canvas (ondas estilizadas cyber)
    function setupWaveAnimation() {
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = 180;
        let time = 0;
        
        function resizeCanvas() {
            width = window.innerWidth;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        function drawWaves() {
            if (!ctx) return;
            ctx.clearRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'source-over';
            
            // Onda 1 (rosa/orgulho)
            ctx.beginPath();
            for (let x = 0; x < width; x++) {
                let y = height/2 + Math.sin(x * 0.012 + time) * 12 + Math.sin(x * 0.025 + time * 1.3) * 8;
                y = y * 0.6 + 10;
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.fillStyle = '#ff3399aa';
            ctx.fill();
            
            // Onda 2 (ciano/tech)
            ctx.beginPath();
            for (let x = 0; x < width; x++) {
                let y = height/2 + 16 + Math.sin(x * 0.018 + time * 1.8) * 10 + Math.cos(x * 0.03) * 5;
                y = y * 0.55 + 25;
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.fillStyle = '#00ccffaa';
            ctx.fill();
            
            // Onda 3 (dourado/energia)
            ctx.beginPath();
            for (let x = 0; x < width; x++) {
                let y = height/2 + 28 + Math.sin(x * 0.009 + time * 0.9) * 15;
                y = y * 0.5 + 40;
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.fillStyle = '#ffaa33aa';
            ctx.fill();
            
            time += 0.028;
            requestAnimationFrame(drawWaves);
        }
        
        drawWaves();
    }
    
    // configura eventos e inicialização
    document.addEventListener('DOMContentLoaded', () => {
        injectWelcomeMessage();
        setupWaveAnimation();
        
        const sendBtn = document.getElementById('sendBtn');
        const input = document.getElementById('userInput');
        sendBtn.addEventListener('click', sendUserMessage);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendUserMessage();
        });
        
        // Efeito de foco no input (feedback visual)
        input.addEventListener('focus', () => {
            document.querySelector('.input-area').style.boxShadow = "0 0 0 2px #ff66aa80, inset 0 0 4px cyan";
        });
        input.addEventListener('blur', () => {
            document.querySelector('.input-area').style.boxShadow = "none";
        });
    });
</script>
</body>
</html>
